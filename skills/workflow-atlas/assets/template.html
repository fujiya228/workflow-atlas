<!DOCTYPE html>
<html lang="en" data-theme="okabe-ito-light">
<!--
  Workflow Atlas — single-file interactive specification (state × operation).
  See SPEC.md. Author edits ONLY data; engine/themes are generic.

  Two authoring paths:
   * BUILD : `atlas build data.json --theme <name> -o out.html`
             substitutes the data + theme regions, the data-theme attribute, and the page title.
   * INLINE: copy this file, edit the #workflow-data JSON block and the
             <html data-theme="…"> attribute in place. No tooling required.

  Self-contained: no network, no external assets. Renders from file://.
-->
<head>
<meta charset="utf-8" />
<title>Workflow Atlas</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style id="atlas-theme">
  /*ATLAS:THEME*/
  /* Pre-paint fallback tokens (Builder overwrites this region; JS re-applies authoritatively). */
  :root{
    --bg:#F8FAFC; --surface:#FFFFFF; --bg-2:#F1F5F9; --panel:#F1F5F9;
    --line:#CBD5E1; --grid:#E2E8F0; --text:#111827; --muted:#64748B;
    --edge:#94A3B8; --edge-active:#0072B2; --edge-active-glow:rgba(0,114,178,0.35);
  }
  /*/ATLAS:THEME*/
</style>
<style>
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background:
      radial-gradient(1200px 600px at 18% -10%, var(--bg-2) 0%, transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:-apple-system,"Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif;
    font-size:13px;
    overflow:hidden;
  }
  #app{ display:flex; flex-direction:column; height:100vh; }

  /* ---- header ---- */
  header{
    display:flex; align-items:center; gap:14px; padding:10px 16px;
    border-bottom:1px solid var(--line); background:color-mix(in srgb, var(--bg) 70%, transparent);
    backdrop-filter:blur(6px); flex:0 0 auto;
  }
  header .brand{ font-weight:700; letter-spacing:.04em; white-space:nowrap; }
  header .brand .glyph{ color:var(--edge-active); }
  header .sub{ color:var(--muted); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  header .spacer{ flex:1; }
  header .hint{ color:var(--muted); font-size:11px; white-space:nowrap; }
  header .hint kbd{
    background:var(--panel); border:1px solid var(--line); border-bottom-width:2px;
    border-radius:4px; padding:0 5px; font-size:10px; color:var(--text);
  }
  header select#theme-select{
    background:var(--panel); color:var(--text); border:1px solid var(--line);
    border-radius:6px; padding:3px 6px; font-size:11px; cursor:pointer;
  }

  /* ---- flow chips ---- */
  #chips{
    display:flex; gap:6px; overflow-x:auto; padding:8px 16px; flex:0 0 auto;
    border-bottom:1px solid var(--line); background:var(--bg-2);
    scrollbar-width:thin;
  }
  .chip{
    display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
    padding:5px 11px; border-radius:999px; cursor:pointer; user-select:none;
    background:var(--panel); border:1px solid var(--line); color:var(--muted);
    font-size:12px; transition:all .15s;
  }
  .chip:hover{ border-color:var(--edge-active); color:var(--text); }
  .chip.active{
    border-color:var(--edge-active); color:var(--edge-active);
    box-shadow:0 0 0 1px var(--edge-active-glow), 0 2px 10px var(--edge-active-glow);
  }
  .chip .ic{ font-size:13px; }
  .chip .kk{ font-size:9px; opacity:.6; }

  /* ---- main ---- */
  main{ flex:1; display:flex; min-height:0; }
  #stage{ position:relative; flex:1; min-width:0; overflow:hidden; cursor:grab; }
  #stage.panning{ cursor:grabbing; }
  svg#canvas{ width:100%; height:100%; display:block; touch-action:none; }

  /* ---- nodes ---- */
  .node .node-rect{
    filter:drop-shadow(0 3px 6px rgba(0,0,0,0.35));
    transition:opacity .35s ease;
  }
  .node .node-title{ font-size:12px; font-weight:700; fill:var(--text); pointer-events:none; }
  .node .node-sub{ font-size:10.5px; fill:var(--nsub); pointer-events:none; }
  .node.in-flow .node-rect{ stroke-width:2.5; filter:drop-shadow(0 0 7px var(--gstroke)); }
  .node.dim{ opacity:.18; }
  .node.endpoint .node-rect{ stroke-width:3; animation:node-glow 1.1s ease-in-out infinite; }
  .col-head{ fill:var(--muted); font-size:12px; font-weight:700; letter-spacing:.34em; }
  .col-div{ stroke:var(--line); stroke-width:1; stroke-dasharray:3,5; opacity:.7; }

  /* ---- edges ---- */
  .edge{ fill:none; }
  .base-edge{ stroke:var(--edge); stroke-width:1.3; opacity:.55; marker-end:url(#arrow-base); }
  .flow-edge{
    stroke:var(--edge-active); stroke-width:2; opacity:.92;
    filter:drop-shadow(0 0 3px var(--edge-active-glow)); marker-end:url(#arrow-active);
  }
  .flow-edge.focused-edge{ animation:edge-pulse 1.1s ease-in-out infinite; }
  .tether{ stroke:var(--edge-active); stroke-width:1; stroke-dasharray:2,3; opacity:.4; fill:none; }

  /* ---- badges ---- */
  .edge-step-hit{ fill:rgba(0,0,0,0.001); pointer-events:all; cursor:pointer; }
  .edge-step-halo{ fill:var(--edge-active-glow); opacity:0; pointer-events:none;
    transform-origin:center; transform-box:fill-box; }
  .edge-step-scale{ transform-origin:center; transform-box:fill-box; }
  .edge-step-pill{ fill:var(--panel); stroke:var(--edge-active); stroke-width:1.2;
    filter:drop-shadow(0 1px 3px rgba(0,0,0,0.45)); }
  .edge-step-badge text{ font-size:11px; font-weight:700; fill:var(--edge-active);
    font-family:ui-monospace,Menlo,Consolas,monospace; pointer-events:none; }
  .edge-step-badge:hover .edge-step-pill{ fill:var(--edge-active); stroke:var(--surface); }
  .edge-step-badge:hover text{ fill:var(--surface); }
  .edge-step-badge.focused .edge-step-scale{ animation:pulse .9s cubic-bezier(.5,0,.5,1) infinite; }
  .edge-step-badge.focused .edge-step-halo{ animation:halo-burst 1.3s ease-out infinite; }
  .edge-step-badge.focused .edge-step-pill{ fill:var(--edge-active); stroke:var(--surface); }
  .edge-step-badge.focused text{ fill:var(--surface); }

  /* ---- keyframes (PIKAPIKA) ---- */
  @keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.42);
      filter:drop-shadow(0 0 7px var(--edge-active)) drop-shadow(0 0 13px var(--edge-active-glow)); }
  }
  @keyframes halo-burst{
    0%{ transform:scale(.55); opacity:.85; }
    100%{ transform:scale(3); opacity:0; }
  }
  @keyframes edge-pulse{
    0%,100%{ stroke:var(--edge-active); stroke-width:2.8; filter:drop-shadow(0 0 4px var(--edge-active-glow)); }
    50%{ stroke-width:4.2; filter:drop-shadow(0 0 9px var(--edge-active)) drop-shadow(0 0 6px var(--edge-active-glow)); }
  }
  @keyframes node-glow{
    0%,100%{ filter:drop-shadow(0 0 6px var(--gstroke)); }
    50%{ filter:drop-shadow(0 0 15px var(--edge-active)) drop-shadow(0 0 7px var(--gstroke)); }
  }
  @keyframes anno-flash{
    0%{ background:var(--edge-active-glow); }
    100%{ background:transparent; }
  }

  /* ---- annotation panel ---- */
  aside{
    flex:0 0 372px; width:372px; border-right:1px solid var(--line);
    background:var(--bg-2);
    display:flex; flex-direction:column; min-height:0;
  }
  .anno-head{ padding:14px 16px 12px; border-bottom:1px solid var(--line); }
  .anno-head .ttl{ font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .anno-head .ttl .ic{ font-size:18px; }
  .anno-head .desc{ color:var(--muted); font-size:11.5px; line-height:1.55; margin-top:7px; }
  .anno-scroll{ overflow-y:auto; padding:10px 14px 40px; flex:1; scrollbar-width:thin; }
  ol.steps{ counter-reset:step; list-style:none; margin:0; padding:0; }
  li.step{
    counter-increment:step; position:relative; padding:9px 10px 10px 38px;
    border-radius:8px; margin-bottom:8px; border:1px solid transparent;
    cursor:pointer; transition:background .15s,border-color .15s;
  }
  li.step:hover{ background:color-mix(in srgb, var(--text) 4%, transparent); border-color:var(--line); }
  li.step::before{
    content:counter(step); position:absolute; left:8px; top:9px;
    width:21px; height:21px; border-radius:50%;
    background:var(--panel); border:1px solid var(--edge-active); color:var(--edge-active);
    font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center;
    font-family:ui-monospace,Menlo,monospace;
  }
  li.step.focused{ animation:anno-flash 1.2s ease-out;
    background:color-mix(in srgb, var(--edge-active) 10%, transparent);
    border-color:var(--edge-active); }
  .step-edge{ font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11.5px; color:var(--text); }
  .step-edge .ep{ color:var(--edge-active); }
  .step-edge .arr{ color:var(--muted); margin:0 4px; }
  .step-passes{
    font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11px; line-height:1.5;
    color:var(--text); background:var(--panel); border-left:2px solid var(--edge-active);
    border-radius:0 5px 5px 0; padding:5px 8px; margin:6px 0 0; word-break:break-word; white-space:pre-wrap;
  }
  .step-note{ color:var(--muted); font-size:11px; line-height:1.5; margin-top:6px; }
  .anno-empty{ color:var(--muted); font-size:12px; line-height:1.7; padding:24px 6px; }
  .anno-empty b{ color:var(--text); }

  /* ---- tooltip ---- */
  #tooltip{
    position:fixed; z-index:60; display:none; max-width:360px; pointer-events:none;
    background:var(--surface); border:1px solid var(--edge-active); border-radius:9px;
    box-shadow:0 8px 26px rgba(0,0,0,0.35), 0 0 0 1px var(--edge-active-glow);
    backdrop-filter:blur(9px); padding:10px 12px; font-size:11.5px; line-height:1.55; color:var(--text);
  }
  #tooltip .tt-flow{ color:var(--edge-active); font-weight:700; font-size:11px; margin-bottom:6px; }
  #tooltip .tt-step + .tt-step{ margin-top:9px; border-top:1px dashed var(--line); padding-top:8px; }
  #tooltip .tt-edge{ font-family:ui-monospace,Menlo,monospace; font-size:11px; }
  #tooltip .tt-edge .chip2{ background:var(--panel); border:1px solid var(--line); color:var(--edge-active);
    border-radius:4px; padding:1px 5px; }
  #tooltip .tt-edge .arr{ color:var(--muted); margin:0 4px; }
  #tooltip .tt-pass{ font-family:ui-monospace,Menlo,monospace; font-size:10.5px; color:var(--text);
    background:var(--panel); border-radius:5px; padding:4px 7px; margin:5px 0 0; white-space:pre-wrap; word-break:break-word; }
  #tooltip .tt-note{ color:var(--muted); margin-top:5px; }
  #tooltip .tt-num{ color:var(--edge-active); font-weight:700; }

  .zoomctl{ position:absolute; right:12px; bottom:12px; display:flex; flex-direction:column; gap:6px; }
  .zoomctl button{
    width:32px; height:32px; border-radius:8px; border:1px solid var(--line);
    background:var(--panel); color:var(--text); font-size:16px; cursor:pointer;
  }
  .zoomctl button:hover{ border-color:var(--edge-active); color:var(--edge-active); }
  @media (max-width:880px){ aside{ display:none; } }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><span class="glyph">◆</span> <span id="brand-title">Workflow Atlas</span></div>
    <div class="sub" id="brand-sub"></div>
    <div class="spacer"></div>
    <select id="theme-select" title="カラースキーム"></select>
    <div class="hint"><kbd>1</kbd>–<kbd>0</kbd> flow&nbsp;·&nbsp;<kbd>←</kbd><kbd>→</kbd> step&nbsp;·&nbsp;<kbd>F</kbd> fit&nbsp;·&nbsp;<kbd>+</kbd><kbd>-</kbd> zoom&nbsp;·&nbsp;<kbd>Esc</kbd> 解除</div>
  </header>
  <div id="chips"></div>
  <main>
    <aside>
      <div class="anno-head">
        <div class="ttl"><span class="ic" id="anno-ic">🗺️</span><span id="anno-title">フローを選択</span></div>
        <div class="desc" id="anno-desc"></div>
      </div>
      <div class="anno-scroll" id="anno-scroll"></div>
    </aside>
    <div id="stage">
      <svg id="canvas" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="zoomctl">
        <button data-z="in" title="ズームイン">＋</button>
        <button data-z="out" title="ズームアウト">－</button>
        <button data-z="fit" title="全体表示 (F)">⤢</button>
      </div>
    </div>
  </main>
</div>
<div id="tooltip"></div>

<script type="application/json" id="workflow-data">
/*ATLAS:DATA*/
{
  "meta": {
    "title": "AI Agent — RAG pipeline (state × operation)",
    "note": "Generic sample. node = state (store/buffer/actor), flow = operation (index/retrieve/generate/tool/memory). Repository-agnostic."
  },
  "viewBox": { "w": 1600, "h": 900 },
  "columns": [
    { "id": "input",    "label": "INPUT",    "x": 140,  "divider": 270 },
    { "id": "index",    "label": "INDEX",    "x": 400,  "divider": 530 },
    { "id": "retrieve", "label": "RETRIEVE", "x": 660,  "divider": 790 },
    { "id": "agent",    "label": "AGENT",    "x": 920,  "divider": 1050 },
    { "id": "tools",    "label": "TOOLS",    "x": 1180, "divider": 1310 },
    { "id": "output",   "label": "OUTPUT",   "x": 1440, "divider": null }
  ],
  "groups": [
    { "id": "input",    "label": "Input" },
    { "id": "index",    "label": "Index" },
    { "id": "retrieve", "label": "Retrieve" },
    { "id": "agent",    "label": "Agent" },
    { "id": "tools",    "label": "Tools" },
    { "id": "output",   "label": "Output" }
  ],
  "nodes": [
    { "id": "user",       "title": "User",          "subtitle": "question / goal",       "group": "input",    "x": 40,   "y": 300, "w": 200, "h": 56 },
    { "id": "raw-docs",   "title": "Raw docs",      "subtitle": "PDF / web / markdown",  "group": "input",    "x": 40,   "y": 560, "w": 200, "h": 56 },
    { "id": "chunks",     "title": "Chunks",        "subtitle": "split + overlap",       "group": "index",    "x": 300,  "y": 120, "w": 200, "h": 56 },
    { "id": "embeddings", "title": "Embeddings",    "subtitle": "dense vector",          "group": "index",    "x": 300,  "y": 320, "w": 200, "h": 56 },
    { "id": "vstore",     "title": "Vector store",  "subtitle": "ANN index (HNSW/IVF)",  "group": "index",    "x": 300,  "y": 520, "w": 200, "h": 56 },
    { "id": "retriever",  "title": "Retriever",     "subtitle": "top-k / rerank",        "group": "retrieve", "x": 560,  "y": 320, "w": 200, "h": 56 },
    { "id": "context",    "title": "Context",       "subtitle": "assembled + sources",   "group": "retrieve", "x": 560,  "y": 520, "w": 200, "h": 56 },
    { "id": "llm",        "title": "LLM",           "subtitle": "Claude / GPT",          "group": "agent",    "x": 820,  "y": 200, "w": 200, "h": 56 },
    { "id": "scratchpad", "title": "Scratchpad",    "subtitle": "intermediate (ReAct)",  "group": "agent",    "x": 820,  "y": 400, "w": 200, "h": 56 },
    { "id": "memory",     "title": "Memory",        "subtitle": "conversation history",  "group": "agent",    "x": 820,  "y": 600, "w": 200, "h": 56 },
    { "id": "tool-reg",   "title": "Tool registry", "subtitle": "function schemas",      "group": "tools",    "x": 1080, "y": 300, "w": 200, "h": 56 },
    { "id": "tool-exec",  "title": "Tool exec",     "subtitle": "side effects / API",    "group": "tools",    "x": 1080, "y": 520, "w": 200, "h": 56 },
    { "id": "answer",     "title": "Answer",        "subtitle": "final response",        "group": "output",   "x": 1340, "y": 300, "w": 200, "h": 56 },
    { "id": "citations",  "title": "Citations",     "subtitle": "source snapshot",       "group": "output",   "x": 1340, "y": 520, "w": 200, "h": 56 }
  ],
  "flows": [
    {
      "id": "index", "icon": "📥", "name": "1. Build the index", "sub": "docs → chunk → embed → store",
      "description": "Unattended preprocessing that makes the knowledge source searchable. Loader → splitter → embedding → upsert into the vector store. Not read at answer time; here we only accumulate.",
      "steps": [
        { "from": "raw-docs",   "to": "chunks",     "passes": "split (overlap)", "note": "loader + splitter" },
        { "from": "chunks",     "to": "embeddings", "passes": "embed",           "note": "embedding model" },
        { "from": "embeddings", "to": "vstore",     "passes": "upsert",          "note": "ANN (HNSW / IVF)" }

    },
    {
      "id": "retrieve", "icon": "🔎", "name": "2. Retrieve", "sub": "question → top-k context",
      "description": "Embed the question, pull nearest neighbors from the vector store, rerank, and assemble a source-tagged context. A read-only operation — no state changes.",
      "steps": [
        { "from": "user",      "to": "retriever", "passes": "embed the question",  "note": "query encoder" },
        { "from": "vstore",    "to": "retriever", "passes": "ANN neighbors (top-k)", "note": "" },
        { "from": "retriever", "to": "context",   "passes": "rerank + assemble",   "note": "with source metadata" }
      ]
    },
    {
      "id": "generate", "icon": "💬", "name": "3. Generate (RAG)", "sub": "context-grounded answer",
      "description": "Inject the retrieved context, generate the answer, and attach a source snapshot. Grounding suppresses hallucination.",
      "steps": [
        { "from": "user",    "to": "llm",       "passes": "question",          "note": "" },
        { "from": "context", "to": "llm",       "passes": "inject context",    "note": "grounding" },
        { "from": "llm",     "to": "answer",    "passes": "generate answer",   "note": "" },
        { "from": "context", "to": "citations", "passes": "source snapshot",   "note": "{source, score}" }
      ]
    },
    {
      "id": "tool-loop", "icon": "🛠️", "name": "4. Tool calls (agent loop)", "sub": "ReAct: think → call → observe",
      "description": "When an external action is needed, the LLM thinks (scratchpad) → selects a tool → executes → reads the observation, looping until it converges.",
      "steps": [
        { "from": "llm",      "to": "scratchpad", "passes": "think (ReAct)",        "note": "intermediate step" },
        { "from": "llm",      "to": "tool-reg",   "passes": "select tool",          "note": "function calling" },
        { "from": "tool-reg", "to": "tool-exec",  "passes": "arguments (JSON)",     "note": "" },
        { "from": "tool-exec","to": "llm",        "passes": "result (observation)", "note": "loop until convergence" }
      ]
    },
    {
      "id": "memory", "icon": "🧠", "name": "5. Memory", "sub": "save turn → inject next turn",
      "description": "Persist the finalized answer into conversation history and inject it into the LLM on the next turn. The short-term memory cycle.",
      "steps": [
        { "from": "answer", "to": "memory", "passes": "save turn",        "note": "" },
        { "from": "memory", "to": "llm",    "passes": "inject history",   "note": "next turn" }
      ]
    },
    {
      "id": "deliver", "icon": "📤", "name": "6. Deliver", "sub": "answer + citations → user",
      "description": "Return the final answer and its sources to the user. Output with no writeback.",
      "steps": [
        { "from": "answer",    "to": "user", "passes": "final answer",  "note": "" },
        { "from": "citations", "to": "user", "passes": "source links",  "note": "no writeback" }
      ]
    }
  ]
}
/*/ATLAS:DATA*/
</script>

<script>
"use strict";
const SVGNS = "http://www.w3.org/2000/svg";
const LANE = 38;
const OFFSETS = [0.50,0.44,0.56,0.38,0.62,0.32,0.68,0.26,0.74,0.20,0.80,0.15,0.85,0.10,0.90];
const DEFAULT_THEME = "okabe-ito-light";

/* ---------- theme tables ---------- */
const THEMES = JSON.parse(document.getElementById("atlas-themes").textContent);
let CURRENT_THEME = null;
let GROUP_COLORS = {};   // group.id -> {stroke, fill, sub}

/* ---------- data loading (embedded preferred for file://) ---------- */
function loadData(){
  const embedded = document.getElementById("workflow-data");
  let txt = embedded.textContent;
  // strip ONLY the wrapping sentinels (anchored), so the markers can also appear inside data values
  txt = txt.replace(/^\s*\/\*ATLAS:DATA\*\/\s*/, "").replace(/\s*\/\*\/ATLAS:DATA\*\/\s*$/, "");
  return JSON.parse(txt);
}

/* ---------- color helpers (hybrid lane resolution, SPEC §5.4–5.5) ---------- */
function isHex(s){ return typeof s === "string" && /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(s.trim()); }
function hexToRgb(h){ h = h.replace("#",""); if(h.length===3) h = h.split("").map(x=>x+x).join("");
  const n = parseInt(h,16); return [ (n>>16)&255, (n>>8)&255, n&255 ]; }
function rgbToHex(a){ return "#" + a.map(v => Math.round(clamp(v,0,255)).toString(16).padStart(2,"0")).join(""); }
function mix(a,b,t){ const A=hexToRgb(a), B=hexToRgb(b); return rgbToHex([0,1,2].map(i => A[i]*(1-t)+B[i]*t)); }

function applyTheme(id){
  const t = THEMES[id] || THEMES[DEFAULT_THEME];
  const c = t.chrome, r = document.documentElement.style;
  r.setProperty("--bg", c.bg);
  r.setProperty("--surface", c.surface);
  r.setProperty("--bg-2", c.panel);
  r.setProperty("--panel", c.panel);
  r.setProperty("--line", c.line);
  r.setProperty("--grid", c.grid);
  r.setProperty("--text", c.text);
  r.setProperty("--muted", c.muted);
  r.setProperty("--edge", c.edge);
  r.setProperty("--edge-active", c["edge-active"]);
  r.setProperty("--edge-active-glow", c["edge-active-glow"]);
  document.documentElement.dataset.theme = t.id;
  CURRENT_THEME = t;
  return t;
}

// resolve each group's (stroke, fill, sub) by per-channel precedence: explicit override > theme derive
function resolveGroups(){
  GROUP_COLORS = {};
  const surface = CURRENT_THEME.chrome.surface, text = CURRENT_THEME.chrome.text;
  const lanes = CURRENT_THEME.lanes;
  DATA.groups.forEach((g, i) => {
    const accent = isHex(g.stroke) ? g.stroke.trim() : lanes[i % lanes.length];
    const stroke = g.stroke || accent;
    const fill   = g.fill || (isHex(accent) ? mix(accent, surface, 0.86) : accent);
    const sub    = g.sub  || (isHex(accent) ? mix(accent, text, 0.45) : CURRENT_THEME.chrome.muted);
    GROUP_COLORS[g.id] = { stroke, fill, sub };
  });
}

/* ---------- small helpers ---------- */
function el(tag, attrs, parent){
  const e = document.createElementNS(SVGNS, tag);
  if(attrs) for(const k in attrs) e.setAttribute(k, attrs[k]);
  if(parent) parent.appendChild(e);
  return e;
}
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function dist(ax,ay,bx,by){ const dx=ax-bx, dy=ay-by; return Math.sqrt(dx*dx+dy*dy); }

/* ---------- globals ---------- */
let DATA, NODES = {}, GROUPS = {};
let svg, stage, tooltip;   // assigned on DOM-ready (robust for file:// / re-saved pages)
let defsEl, gridLayer, baseEdgeLayer, flowEdgeLayer, nodeLayer, badgeLayer;
let nodeEls = {};
let view = { x:0, y:0, w:1500, h:900 };
let baseView = { x:0, y:0, w:1500, h:900 };
let activeFlowId = null;
let focusedStepIdx = null;
let edgeIndex = [];
let stepToEdge = {};
let liEls = {};
let animRAF = null;

/* ---------- init ---------- */
function init(){
  DATA = loadData();
  DATA.nodes.forEach(n => NODES[n.id] = n);
  DATA.groups.forEach(g => GROUPS[g.id] = g);

  // theme: from <html data-theme>, fall back to default
  applyTheme(document.documentElement.dataset.theme || DEFAULT_THEME);
  resolveGroups();

  baseView = { x:0, y:0, w:DATA.viewBox.w, h:DATA.viewBox.h };
  view = Object.assign({}, baseView);
  svg.setAttribute("viewBox", `0 0 ${baseView.w} ${baseView.h}`);
  setView(view);

  // header from meta
  document.title = DATA.meta.title || "Workflow Atlas";
  document.getElementById("brand-title").textContent = DATA.meta.title || "Workflow Atlas";
  document.getElementById("brand-sub").textContent =
    `${DATA.nodes.length} nodes × ${DATA.flows.length} flows` + (DATA.meta.repo ? ` — ${DATA.meta.repo}` : "");

  defsEl = el("defs", null, svg);
  buildArrowMarkers();
  gridLayer      = el("g", { class:"grid-layer" }, svg);
  baseEdgeLayer  = el("g", { class:"base-edge-layer" }, svg);
  flowEdgeLayer  = el("g", { class:"flow-edge-layer" }, svg);
  nodeLayer      = el("g", { class:"node-layer" }, svg);
  badgeLayer     = el("g", { class:"badge-layer" }, svg);   // last → above nodes

  buildGrid();
  buildBaseEdges();
  buildNodes();
  buildChips();
  buildThemeSelect();
  wireInteractions();

  const hashed = flowFromHash();
  if(hashed){
    // deep-link: when a step is given, skip the flow-fit (it would be cancelled by the step pan)
    selectFlow(hashed.id, hashed.step != null ? "none" : "flow");
    if(hashed.step != null) gotoStep(hashed.step - 1);
  } else if(DATA.flows.length){
    selectFlow(DATA.flows[0].id, "all");
  } else {
    clearFlow();   // no flows → overview only, never crash on DATA.flows[0]
  }
  window.addEventListener("hashchange", () => {
    const f = flowFromHash();
    if(f){ selectFlow(f.id, f.step != null ? "none" : "flow"); if(f.step != null) gotoStep(f.step - 1); }
  });
}

/* ---------- bootstrap (query DOM elements once it's ready) ---------- */
function boot(){
  svg = document.getElementById("canvas");
  stage = document.getElementById("stage");
  tooltip = document.getElementById("tooltip");
  init();
}
if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
else boot();

// #flow=<id|n>, #flow=<id>:<step>, or #<id>
function flowFromHash(){
  const h = decodeURIComponent(location.hash.replace(/^#/, "")).trim();
  if(!h) return null;
  let v = h.includes("=") ? h.split("=")[1] : h;
  let step = null;
  if(v.includes(":")){ const parts = v.split(":"); v = parts[0]; const s = parseInt(parts[1],10); if(!isNaN(s)) step = s; }
  let id = null;
  if(/^\d+$/.test(v)){ const f = DATA.flows[+v - 1]; id = f ? f.id : null; }
  else id = DATA.flows.some(f => f.id === v) ? v : null;
  return id ? { id, step } : null;
}

/* ---------- defs (arrow markers, theme-colored) ---------- */
function buildArrowMarkers(){
  defsEl.textContent = "";
  const cs = getComputedStyle(document.documentElement);
  const edgeCol = (cs.getPropertyValue("--edge").trim()) || "#3a4452";
  const edgeActive = (cs.getPropertyValue("--edge-active").trim()) || "#ffd166";
  const mkArrow = (id, color, scale) => {
    const m = el("marker", { id, viewBox:"0 0 10 10", refX:"9", refY:"5",
      markerWidth:String(scale), markerHeight:String(scale), orient:"auto-start-reverse" }, defsEl);
    el("path", { d:"M0,0 L10,5 L0,10 z", fill:color }, m);
  };
  mkArrow("arrow-base", edgeCol, 6);
  mkArrow("arrow-active", edgeActive, 7.5);
}

/* ---------- grid ---------- */
function buildGrid(){
  const H = baseView.h;
  DATA.columns.forEach(c => {
    const t = el("text", { x:c.x, y:42, "text-anchor":"middle", class:"col-head" }, gridLayer);
    t.textContent = c.label;
    if(c.divider != null){
      el("line", { x1:c.divider, y1:64, x2:c.divider, y2:H-20, class:"col-div" }, gridLayer);
    }
  });
}

/* ---------- nodes ---------- */
function buildNodes(){
  DATA.nodes.forEach(n => {
    const gc = GROUP_COLORS[n.group] || { stroke:"#888", fill:"#222", sub:"#aaa" };
    const node = el("g", { class:"node", "data-id":n.id,
      style:`--gstroke:${gc.stroke}; --nsub:${gc.sub}` }, nodeLayer);
    node.setAttribute("transform", `translate(${n.x},${n.y})`);
    el("rect", { class:"node-rect", x:0, y:0, width:n.w, height:n.h, rx:8,
      fill:gc.fill, stroke:gc.stroke, "stroke-width":1.5 }, node);
    const t1 = el("text", { class:"node-title", x:13, y:23 }, node);
    t1.textContent = n.title;
    if(n.subtitle){
      const t2 = el("text", { class:"node-sub", x:13, y:41 }, node);
      t2.textContent = n.subtitle;
    }
    nodeEls[n.id] = node;
  });
}

// re-apply resolved colors to existing node DOM (used on live theme switch)
function recolorNodes(){
  resolveGroups();
  DATA.nodes.forEach(n => {
    const gc = GROUP_COLORS[n.group], node = nodeEls[n.id];
    if(!gc || !node) return;
    node.style.setProperty("--gstroke", gc.stroke);
    node.style.setProperty("--nsub", gc.sub);
    const rect = node.querySelector(".node-rect");
    rect.setAttribute("fill", gc.fill);
    rect.setAttribute("stroke", gc.stroke);
  });
}

/* ---------- geometry ---------- */
function nodeRect(n){ return { x:n.x, y:n.y, w:n.w, h:n.h, cx:n.x+n.w/2, cy:n.y+n.h/2,
  l:n.x, r:n.x+n.w, t:n.y, b:n.y+n.h }; }
function sameColumn(a,b){ return Math.abs(a.x - b.x) < 1; }

function edgeGeom(aId, bId, lane){
  const A = nodeRect(NODES[aId]), B = nodeRect(NODES[bId]);
  let sx,sy,ex,ey,c1x,c1y,c2x,c2y;
  if(sameColumn(NODES[aId], NODES[bId])){
    if(A.cy <= B.cy){ sx=A.cx; sy=A.b; ex=B.cx; ey=B.t; }
    else            { sx=A.cx; sy=A.t; ex=B.cx; ey=B.b; }
    const dy = ey - sy;
    c1x = sx + lane; c1y = sy + dy*0.40;
    c2x = ex + lane; c2y = ey - dy*0.40;
  }else{
    if(A.cx < B.cx){ sx=A.r; sy=A.cy; ex=B.l; ey=B.cy; }
    else           { sx=A.l; sy=A.cy; ex=B.r; ey=B.cy; }
    const dx = ex - sx;
    c1x = sx + dx*0.40; c1y = sy + lane;
    c2x = ex - dx*0.40; c2y = ey + lane;
  }
  return { d:`M ${sx} ${sy} C ${c1x} ${c1y} ${c2x} ${c2y} ${ex} ${ey}`, sx,sy,ex,ey };
}

function laneFor(aId, bId, set){
  const rev = set.has(bId + " " + aId);
  if(!rev) return 0;
  return (aId < bId) ? LANE : -LANE;
}

/* ---------- base edges ---------- */
let BASE_EDGE_SET = new Set();   // all directed (from,to) pairs across ALL flows (lane reference)
function buildBaseEdges(){
  BASE_EDGE_SET = new Set();
  DATA.flows.forEach(f => f.steps.forEach(s => BASE_EDGE_SET.add(s.from + " " + s.to)));
  BASE_EDGE_SET.forEach(key => {
    const [a,b] = key.split(" ");
    if(!NODES[a] || !NODES[b]) return;
    const lane = laneFor(a, b, BASE_EDGE_SET);
    const g = edgeGeom(a, b, lane);
    el("path", { class:"edge base-edge", d:g.d }, baseEdgeLayer);
  });
}

/* ---------- flow selection ---------- */
function selectFlow(flowId, fitMode){
  const flow = DATA.flows.find(f => f.id === flowId);
  if(!flow) return;
  activeFlowId = flowId;
  focusedStepIdx = null;
  clearFocusClasses();

  const map = new Map();
  const order = [];
  flow.steps.forEach((s, i) => {
    if(!NODES[s.from] || !NODES[s.to]) return;   // skip steps referencing unknown nodes (inline-edit safety)
    const key = s.from + " " + s.to;
    let e = map.get(key);
    if(!e){ e = { key, from:s.from, to:s.to, steps:[], cycle:0 }; map.set(key, e); order.push(e); }
    e.steps.push({ idx:i, step:s });
  });
  const edges = order;

  flowEdgeLayer.textContent = "";
  badgeLayer.textContent = "";
  edgeIndex = edges;
  stepToEdge = {};
  liEls = {};

  const inFlow = new Set();
  edges.forEach(e => { inFlow.add(e.from); inFlow.add(e.to); });
  for(const id in nodeEls){
    nodeEls[id].classList.toggle("in-flow", inFlow.has(id));
    nodeEls[id].classList.toggle("dim", !inFlow.has(id));
    nodeEls[id].classList.remove("endpoint");
  }
  baseEdgeLayer.style.display = "none";

  edges.forEach(e => {
    const lane = laneFor(e.from, e.to, BASE_EDGE_SET);   // same set as base edges → highlight overlaps base
    const g = edgeGeom(e.from, e.to, lane);
    const p = el("path", { class:"edge flow-edge", d:g.d }, flowEdgeLayer);
    e.pathEl = p;
    const len = p.getTotalLength();
    e.len = len;
    e.midPt = p.getPointAtLength(len * 0.5);
    e.steps.forEach(st => stepToEdge[st.idx] = e);
  });

  placeBadges(edges);
  buildAnnotation(flow, edges);

  if(fitMode === "all") animateView(baseView, 420);
  else if(fitMode === "flow") fitToNodes(Array.from(inFlow), 60);

  document.querySelectorAll(".chip").forEach(c =>
    c.classList.toggle("active", c.dataset.flow === flowId));
}

function clearFlow(){
  activeFlowId = null;
  focusedStepIdx = null;
  clearFocusClasses();
  flowEdgeLayer.textContent = "";
  badgeLayer.textContent = "";
  edgeIndex = []; stepToEdge = {}; liEls = {};
  baseEdgeLayer.style.display = "";
  for(const id in nodeEls){ nodeEls[id].classList.remove("in-flow","dim","endpoint"); }
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  document.getElementById("anno-ic").textContent = "🗺️";
  document.getElementById("anno-title").textContent = "概要モード";
  document.getElementById("anno-desc").textContent =
    `全 ${DATA.nodes.length} ノードと全フローのエッジを表示中。上部のチップ、または数字キー 1–9 / 0 でフローを選択してください。`;
  document.getElementById("anno-scroll").innerHTML =
    '<div class="anno-empty">フローを選ぶと、<b>1 エッジ = 1 バッジ</b>のステップ番号と注釈リストが表示されます。<br><br>' +
    '<b>← →</b> (または <b>↑ ↓</b>) でステップを送る／戻す、<b>Home/End</b> で先頭／末尾へ。' +
    'バッジ／注釈クリックでも該当ステップへ pan します。</div>';
}

/* ---------- badge placement ---------- */
function placeBadges(edges){
  const placed = [];
  const margin = 4;
  const ordered = edges.slice().sort((a,b) => {
    const am = a.steps.length > 1 ? 0 : 1;
    const bm = b.steps.length > 1 ? 0 : 1;
    if(am !== bm) return am - bm;
    return a.len - b.len;
  });

  ordered.forEach(e => {
    const label = badgeLabel(e.steps.map(s => s.idx + 1));
    const badge = buildBadgeDOM(e, label);
    e.badgeEl = badge.outer;
    const bw = badge.w, bh = badge.h;

    let best = null;
    for(const t of OFFSETS){
      const pt = e.pathEl.getPointAtLength(e.len * t);
      const cand = { x:pt.x, y:pt.y, w:bw, h:bh };
      const overlapsNode = rectHitsNodes(cand.x - bw/2, cand.y - bh/2, bw, bh, margin);
      let minBadge = Infinity;
      for(const p of placed){
        const nx = (cand.x - p.x) / (((bw + p.w)/2) + 6);
        const ny = (cand.y - p.y) / (((bh + p.h)/2) + 6);
        const d = Math.sqrt(nx*nx + ny*ny);
        if(d < minBadge) minBadge = d;
      }
      const score = (overlapsNode ? -3.5 : 0) + (minBadge === Infinity ? 2 : Math.min(minBadge, 2));
      if(!best || score > best.score) best = { score, pt, t, overlapsNode };
    }

    let px = best.pt.x, py = best.pt.y;
    if(best.overlapsNode || pointInNodes(px, py, margin)){
      const base = e.len * best.t;
      const step = 5;
      let found = null;
      for(let k = 1; k <= 60; k++){
        for(const dir of [1,-1]){
          const L = clamp(base + dir*k*step, 4, e.len - 4);
          const pt = e.pathEl.getPointAtLength(L);
          if(!rectHitsNodes(pt.x - bw/2, pt.y - bh/2, bw, bh, margin)){ found = pt; break; }
        }
        if(found) break;
      }
      if(found){ px = found.x; py = found.y; }
    }

    badge.outer.setAttribute("transform", `translate(${px},${py})`);
    e.badgePt = { x:px, y:py };
    placed.push({ x:px, y:py, w:bw, h:bh });

    const dm = dist(px, py, e.midPt.x, e.midPt.y);
    if(dm > 34){
      el("path", { class:"tether", d:`M ${px} ${py} L ${e.midPt.x} ${e.midPt.y}` }, badge.tetherHost);
    }
  });

  ordered.forEach(e => badgeLayer.appendChild(e.badgeEl));
}

function badgeLabel(nums){
  nums = nums.slice().sort((a,b)=>a-b);
  if(nums.length === 1) return String(nums[0]);
  if(nums.length <= 5) return nums.join(" · ");
  return `${nums[0]}–${nums[nums.length-1]} (${nums.length})`;
}

function buildBadgeDOM(edge, label){
  const outer = el("g", { class:"edge-step-badge" });
  badgeLayer.appendChild(outer);
  const halo = el("ellipse", { class:"edge-step-halo", cx:0, cy:0, rx:1, ry:1 }, outer);
  const hit  = el("rect", { class:"edge-step-hit" }, outer);
  const scale = el("g", { class:"edge-step-scale" }, outer);
  const pill = el("rect", { class:"edge-step-pill" }, scale);
  const txt  = el("text", { x:0, y:0, "dominant-baseline":"central", "text-anchor":"middle" }, scale);
  txt.textContent = label;

  const tb = txt.getBBox();
  const h = 22;
  const w = Math.max(22, tb.width + 16);
  pill.setAttribute("x", -w/2); pill.setAttribute("y", -h/2);
  pill.setAttribute("width", w); pill.setAttribute("height", h);
  pill.setAttribute("rx", h/2);
  halo.setAttribute("rx", w/2 + 4); halo.setAttribute("ry", h/2 + 4);
  hit.setAttribute("x", -w/2 - 8); hit.setAttribute("y", -h/2 - 8);
  hit.setAttribute("width", w + 16); hit.setAttribute("height", h + 16);

  outer.addEventListener("mouseover", () => showTooltipForEdge(edge));
  outer.addEventListener("mousemove", moveTooltip);
  outer.addEventListener("mouseout", (ev) => {
    if(outer.contains(ev.relatedTarget)) return;
    hideTooltip();
  });
  outer.addEventListener("click", (ev) => {
    ev.stopPropagation();
    const i = edge.steps[edge.cycle % edge.steps.length].idx;
    edge.cycle++;
    focusStep(i, true);
  });

  return { outer, w, h, tetherHost: badgeLayer };
}

/* ---------- node hit-testing ---------- */
function rectHitsNodes(x,y,w,h,m){
  for(const id in NODES){
    const n = NODES[id];
    if(x < n.x+n.w+m && x+w > n.x-m && y < n.y+n.h+m && y+h > n.y-m) return true;
  }
  return false;
}
function pointInNodes(px,py,m){
  for(const id in NODES){
    const n = NODES[id];
    if(px > n.x-m && px < n.x+n.w+m && py > n.y-m && py < n.y+n.h+m) return true;
  }
  return false;
}

/* ---------- annotation panel ---------- */
function buildAnnotation(flow, edges){
  document.getElementById("anno-ic").textContent = flow.icon || "▸";
  document.getElementById("anno-title").textContent = flow.name;
  document.getElementById("anno-desc").textContent = flow.description || "";
  const scroll = document.getElementById("anno-scroll");
  scroll.innerHTML = "";
  const ol = document.createElement("ol");
  ol.className = "steps";
  flow.steps.forEach((s, i) => {
    const li = document.createElement("li");
    li.className = "step";
    li.dataset.idx = i;
    const fromN = NODES[s.from], toN = NODES[s.to];
    const edge = document.createElement("div");
    edge.className = "step-edge";
    edge.innerHTML = `<span class="ep"></span><span class="arr">→</span><span class="ep"></span>`;
    edge.querySelectorAll(".ep")[0].textContent = fromN ? fromN.title : s.from;
    edge.querySelectorAll(".ep")[1].textContent = toN ? toN.title : s.to;
    const passes = document.createElement("div");
    passes.className = "step-passes";
    passes.textContent = s.passes;
    li.appendChild(edge); li.appendChild(passes);
    if(s.note){
      const note = document.createElement("div");
      note.className = "step-note";
      note.textContent = s.note;
      li.appendChild(note);
    }
    li.addEventListener("click", () => {
      const e = stepToEdge[i]; if(e) e.cycle = e.steps.findIndex(st => st.idx === i) + 1;
      focusStep(i, true);
    });
    ol.appendChild(li);
    liEls[i] = li;
  });
  scroll.appendChild(ol);
}

/* ---------- focus (PIKAPIKA) + stepping ---------- */
function clearFocusClasses(){
  document.querySelectorAll(".edge-step-badge.focused").forEach(b => b.classList.remove("focused"));
  document.querySelectorAll(".flow-edge.focused-edge").forEach(p => p.classList.remove("focused-edge"));
  document.querySelectorAll(".node.endpoint").forEach(n => n.classList.remove("endpoint"));
  document.querySelectorAll("li.step.focused").forEach(l => l.classList.remove("focused"));
}
function focusStep(idx, doPan){
  const e = stepToEdge[idx];
  if(!e) return;
  focusedStepIdx = idx;
  clearFocusClasses();
  if(e.badgeEl) e.badgeEl.classList.add("focused");
  if(e.pathEl) e.pathEl.classList.add("focused-edge");
  if(nodeEls[e.from]) nodeEls[e.from].classList.add("endpoint");
  if(nodeEls[e.to]) nodeEls[e.to].classList.add("endpoint");
  const li = liEls[idx];
  if(li){
    li.classList.remove("focused");
    void li.offsetWidth;
    li.classList.add("focused");
    li.scrollIntoView({ behavior:"smooth", block:"nearest" });
  }
  if(doPan && e.badgePt) panTo(e.badgePt.x, e.badgePt.y);
}

// keyboard step navigation (SPEC §7.3): walk flow.steps order, clamp at ends
function stepCount(){ const f = DATA.flows.find(x => x.id === activeFlowId); return f ? f.steps.length : 0; }
function gotoStep(idx){
  if(!activeFlowId) return;
  const n = stepCount();
  if(n === 0) return;
  idx = clamp(idx, 0, n - 1);
  const e = stepToEdge[idx];
  if(e) e.cycle = e.steps.findIndex(st => st.idx === idx) + 1;
  focusStep(idx, true);
}

/* ---------- tooltip ---------- */
let lastMouse = { x:0, y:0 };
function showTooltipForEdge(edge){
  if(!activeFlowId) return;
  const flow = DATA.flows.find(f => f.id === activeFlowId);
  let html = `<div class="tt-flow">${escapeHtml((flow.icon ? flow.icon + " " : "") + flow.name)}</div>`;
  edge.steps.forEach(st => {
    const s = st.step;
    const fromN = NODES[s.from], toN = NODES[s.to];
    html += `<div class="tt-step">`;
    html += `<div class="tt-edge"><span class="tt-num">#${st.idx+1}</span> `;
    html += `<span class="chip2">${escapeHtml(fromN?fromN.title:s.from)}</span>`;
    html += `<span class="arr">→</span>`;
    html += `<span class="chip2">${escapeHtml(toN?toN.title:s.to)}</span></div>`;
    html += `<div class="tt-pass">${escapeHtml(s.passes)}</div>`;
    if(s.note) html += `<div class="tt-note">${escapeHtml(s.note)}</div>`;
    html += `</div>`;
  });
  tooltip.innerHTML = html;
  tooltip.style.display = "block";
  positionTooltip();
}
function moveTooltip(ev){ lastMouse = { x:ev.clientX, y:ev.clientY }; positionTooltip(); }
function positionTooltip(){
  if(tooltip.style.display !== "block") return;
  const pad = 16, vw = window.innerWidth, vh = window.innerHeight;
  const r = tooltip.getBoundingClientRect();
  let x = lastMouse.x + pad, y = lastMouse.y + pad;
  if(x + r.width > vw - 8) x = lastMouse.x - pad - r.width;
  if(y + r.height > vh - 8) y = lastMouse.y - pad - r.height;
  tooltip.style.left = Math.max(8, x) + "px";
  tooltip.style.top  = Math.max(8, y) + "px";
}
function hideTooltip(){ tooltip.style.display = "none"; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

/* ---------- view (zoom / pan) ---------- */
function setView(v){
  view = v;
  svg.setAttribute("viewBox", `${v.x} ${v.y} ${v.w} ${v.h}`);
}
function clientToSvg(cx, cy){
  const r = svg.getBoundingClientRect();
  return { x: view.x + ((cx - r.left)/r.width) * view.w,
           y: view.y + ((cy - r.top)/r.height) * view.h };
}
function zoomAt(cx, cy, factor){
  cancelAnim();
  const piv = clientToSvg(cx, cy);
  let nw = clamp(view.w * factor, 240, 4200);
  let nh = nw * (baseView.h / baseView.w);
  const k = nw / view.w;
  const nx = piv.x - (piv.x - view.x) * k;
  const ny = piv.y - (piv.y - view.y) * k;
  setView({ x:nx, y:ny, w:nw, h:nh });
}
function panTo(svgx, svgy){
  animateView({ x: svgx - view.w/2, y: svgy - view.h/2, w: view.w, h: view.h }, 360);
}
function fitToNodes(ids, pad){
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  ids.forEach(id => { const n = NODES[id]; if(!n) return;
    minx=Math.min(minx,n.x); miny=Math.min(miny,n.y);
    maxx=Math.max(maxx,n.x+n.w); maxy=Math.max(maxy,n.y+n.h); });
  if(minx > maxx) return;
  let bw = (maxx-minx) + pad*2, bh = (maxy-miny) + pad*2;
  const cx = (minx+maxx)/2, cy = (miny+maxy)/2;
  const aspect = baseView.w / baseView.h;
  if(bw / bh > aspect) bh = bw / aspect; else bw = bh * aspect;
  animateView({ x:cx-bw/2, y:cy-bh/2, w:bw, h:bh }, 420);
}
function cancelAnim(){ if(animRAF){ cancelAnimationFrame(animRAF); animRAF = null; } }
function animateView(target, dur){
  cancelAnim();
  const start = Object.assign({}, view);
  const t0 = performance.now();
  const ease = t => t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
  function frame(now){
    const p = clamp((now - t0)/dur, 0, 1);
    const e = ease(p);
    setView({ x:start.x+(target.x-start.x)*e, y:start.y+(target.y-start.y)*e,
              w:start.w+(target.w-start.w)*e, h:start.h+(target.h-start.h)*e });
    if(p < 1) animRAF = requestAnimationFrame(frame); else animRAF = null;
  }
  animRAF = requestAnimationFrame(frame);
}

/* ---------- chips ---------- */
function buildChips(){
  const host = document.getElementById("chips");
  DATA.flows.forEach((f, i) => {
    const c = document.createElement("div");
    c.className = "chip";
    c.dataset.flow = f.id;
    const key = i < 9 ? String(i+1) : (i === 9 ? "0" : "");
    c.innerHTML = `<span class="ic"></span><span class="nm"></span>` + (key ? `<span class="kk">${key}</span>` : "");
    c.querySelector(".ic").textContent = f.icon || "▸";
    c.querySelector(".nm").textContent = f.name;
    c.addEventListener("click", () => selectFlow(f.id, "flow"));
    host.appendChild(c);
  });
}

/* ---------- theme switcher ---------- */
function buildThemeSelect(){
  const sel = document.getElementById("theme-select");
  Object.keys(THEMES).forEach(id => {
    const o = document.createElement("option");
    o.value = id; o.textContent = THEMES[id].name || id;
    if(id === CURRENT_THEME.id) o.selected = true;
    sel.appendChild(o);
  });
  sel.addEventListener("change", () => {
    applyTheme(sel.value);
    recolorNodes();
    buildArrowMarkers();
  });
}

/* ---------- interactions ---------- */
function wireInteractions(){
  stage.addEventListener("wheel", (ev) => {
    ev.preventDefault();
    const factor = ev.deltaY > 0 ? 1.12 : 1/1.12;
    zoomAt(ev.clientX, ev.clientY, factor);
  }, { passive:false });

  let dragging = false, last = null;
  stage.addEventListener("mousedown", (ev) => {
    if(ev.button !== 0) return;
    dragging = true; last = { x:ev.clientX, y:ev.clientY };
    stage.classList.add("panning"); cancelAnim();
  });
  window.addEventListener("mousemove", (ev) => {
    if(!dragging) return;
    const r = svg.getBoundingClientRect();
    const dx = (ev.clientX - last.x)/r.width * view.w;
    const dy = (ev.clientY - last.y)/r.height * view.h;
    last = { x:ev.clientX, y:ev.clientY };
    setView({ x:view.x - dx, y:view.y - dy, w:view.w, h:view.h });
  });
  window.addEventListener("mouseup", () => { dragging = false; stage.classList.remove("panning"); });

  svg.addEventListener("click", () => hideTooltip());

  document.querySelectorAll(".zoomctl button").forEach(b => {
    b.addEventListener("click", () => {
      const r = svg.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      if(b.dataset.z === "in") zoomAt(cx, cy, 1/1.25);
      else if(b.dataset.z === "out") zoomAt(cx, cy, 1.25);
      else animateView(baseView, 420);
    });
  });

  window.addEventListener("keydown", (ev) => {
    if(ev.metaKey || ev.ctrlKey || ev.altKey) return;
    if(ev.target && /^(INPUT|SELECT|TEXTAREA)$/.test(ev.target.tagName)) return;
    const k = ev.key;
    if(k >= "1" && k <= "9"){ const i = +k - 1; if(DATA.flows[i]) selectFlow(DATA.flows[i].id, "flow"); }
    else if(k === "0"){ if(DATA.flows[9]) selectFlow(DATA.flows[9].id, "flow"); }
    else if(k === "f" || k === "F"){ animateView(baseView, 420); }
    else if(k === "+" || k === "="){ const r=svg.getBoundingClientRect(); zoomAt(r.left+r.width/2, r.top+r.height/2, 1/1.2); }
    else if(k === "-" || k === "_"){ const r=svg.getBoundingClientRect(); zoomAt(r.left+r.width/2, r.top+r.height/2, 1.2); }
    // ---- step navigation (only when a flow is active; clamp at ends) ----
    else if(activeFlowId && (k === "ArrowRight" || k === "ArrowDown")){
      ev.preventDefault(); gotoStep(focusedStepIdx == null ? 0 : focusedStepIdx + 1);
    }
    else if(activeFlowId && (k === "ArrowLeft" || k === "ArrowUp")){
      ev.preventDefault(); gotoStep(focusedStepIdx == null ? stepCount() - 1 : focusedStepIdx - 1);
    }
    else if(activeFlowId && k === "Home"){ ev.preventDefault(); gotoStep(0); }
    else if(activeFlowId && k === "End"){ ev.preventDefault(); gotoStep(stepCount() - 1); }
    else if(k === "Escape"){
      if(focusedStepIdx != null){ focusedStepIdx = null; clearFocusClasses(); }
      else if(activeFlowId){ clearFlow(); }
    }
  });

  window.addEventListener("resize", () => positionTooltip());
}
</script>
